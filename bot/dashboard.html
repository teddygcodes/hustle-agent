<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Glint — Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter+Tight:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0b0d0c;
  --bg-elev: #111413;
  --bg-elev-2: #161a19;
  --border: #1f2422;
  --border-strong: #2a302d;
  --text: #e8ece9;
  --text-muted: #8a928e;
  --text-dim: #5c6461;
  --accent: oklch(78% 0.14 170);
  --accent-soft: oklch(78% 0.14 170 / 0.15);
  --accent-softer: oklch(78% 0.14 170 / 0.08);
  --pos: oklch(78% 0.14 155);
  --pos-soft: oklch(78% 0.14 155 / 0.14);
  --neg: oklch(70% 0.17 25);
  --neg-soft: oklch(70% 0.17 25 / 0.14);
  --warn: oklch(80% 0.12 80);
  --warn-soft: oklch(80% 0.12 80 / 0.14);
  --radius: 10px;
  --radius-sm: 6px;
  --shadow: 0 1px 0 rgba(255,255,255,0.03) inset, 0 0 0 1px var(--border);
  --row-h: 44px;
  --pad: 20px;
  --gap: 14px;
}

body[data-theme="light"] {
  --bg: #f6f6f4;
  --bg-elev: #ffffff;
  --bg-elev-2: #fbfbf9;
  --border: #e8e8e3;
  --border-strong: #d8d8d2;
  --text: #181a19;
  --text-muted: #6b716d;
  --text-dim: #9aa09c;
  --accent: oklch(62% 0.14 170);
  --accent-soft: oklch(62% 0.14 170 / 0.13);
  --accent-softer: oklch(62% 0.14 170 / 0.06);
  --pos: oklch(55% 0.14 155);
  --pos-soft: oklch(55% 0.14 155 / 0.12);
  --neg: oklch(55% 0.19 25);
  --neg-soft: oklch(55% 0.19 25 / 0.1);
  --warn: oklch(62% 0.15 75);
  --warn-soft: oklch(62% 0.15 75 / 0.13);
  --shadow: 0 1px 0 rgba(0,0,0,0.015) inset, 0 0 0 1px var(--border);
}

body[data-accent="violet"] {
  --accent: oklch(72% 0.16 300);
  --accent-soft: oklch(72% 0.16 300 / 0.16);
  --accent-softer: oklch(72% 0.16 300 / 0.08);
}
body[data-accent="amber"] {
  --accent: oklch(80% 0.14 75);
  --accent-soft: oklch(80% 0.14 75 / 0.16);
  --accent-softer: oklch(80% 0.14 75 / 0.08);
}
body[data-accent="sky"] {
  --accent: oklch(76% 0.13 230);
  --accent-soft: oklch(76% 0.13 230 / 0.16);
  --accent-softer: oklch(76% 0.13 230 / 0.08);
}

body[data-density="compact"] { --pad: 14px; --gap: 10px; --row-h: 36px; }
body[data-density="comfortable"] { --pad: 20px; --gap: 14px; --row-h: 44px; }
body[data-density="spacious"] { --pad: 26px; --gap: 18px; --row-h: 54px; }

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text); }
body {
  font-family: 'Inter Tight', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  font-size: 14px;
  line-height: 1.45;
  -webkit-font-smoothing: antialiased;
  letter-spacing: -0.005em;
  min-height: 100vh;
}

.mono { font-family: 'JetBrains Mono', 'SF Mono', monospace; font-feature-settings: 'tnum' 1; font-variant-numeric: tabular-nums; }
.serif { font-family: 'Instrument Serif', Georgia, serif; font-style: italic; letter-spacing: -0.01em; }

/* ======= LAYOUT ======= */
.app {
  display: grid;
  grid-template-columns: 232px 1fr;
  min-height: 100vh;
}
.sidebar {
  border-right: 1px solid var(--border);
  padding: 18px 14px;
  display: flex; flex-direction: column;
  gap: 22px;
  position: sticky; top: 0;
  height: 100vh;
  background: var(--bg);
}
.logo {
  display: flex; align-items: center; gap: 10px;
  padding: 2px 6px;
}
.logo-mark {
  width: 26px; height: 26px;
  border-radius: 7px;
  background: conic-gradient(from 210deg, var(--accent), oklch(from var(--accent) calc(l * 0.85) c h), var(--accent));
  box-shadow: 0 0 0 1px var(--border-strong), inset 0 0 0 3px var(--bg-elev);
  position: relative;
}
.logo-mark::after {
  content: "";
  position: absolute; inset: 8px;
  border-radius: 999px;
  background: var(--accent);
  opacity: 0.9;
}
.logo-text {
  font-weight: 600;
  font-size: 15px;
  letter-spacing: -0.01em;
}
.logo-text small {
  display: block;
  font-weight: 400;
  color: var(--text-muted);
  font-size: 11px;
  letter-spacing: 0.02em;
  text-transform: uppercase;
}

.nav-section-title {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--text-dim);
  padding: 0 10px 8px;
}
.nav { display: flex; flex-direction: column; gap: 1px; }
.nav-item {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 10px;
  border-radius: var(--radius-sm);
  color: var(--text-muted);
  cursor: pointer;
  font-size: 13.5px;
  font-weight: 500;
  user-select: none;
  transition: background 0.12s, color 0.12s;
}
.nav-item:hover { background: var(--bg-elev); color: var(--text); }
.nav-item.active {
  background: var(--bg-elev);
  color: var(--text);
}
.nav-item.active .nav-dot { background: var(--accent); }
.nav-dot {
  width: 6px; height: 6px; border-radius: 999px;
  background: var(--border-strong);
}
.nav-item .count {
  margin-left: auto;
  font-size: 11px;
  color: var(--text-dim);
  font-family: 'JetBrains Mono', monospace;
}

.sidebar-foot {
  margin-top: auto;
  padding: 10px;
  border-top: 1px solid var(--border);
  display: flex; flex-direction: column; gap: 10px;
}
.heartbeat {
  display: flex; align-items: center; gap: 8px;
  font-size: 12px;
  color: var(--text-muted);
}
.pulse {
  width: 8px; height: 8px; border-radius: 999px;
  background: var(--pos);
  box-shadow: 0 0 0 0 var(--pos-soft);
  animation: pulse 2s infinite;
}
@keyframes pulse {
  0% { box-shadow: 0 0 0 0 var(--pos-soft); }
  70% { box-shadow: 0 0 0 8px transparent; }
  100% { box-shadow: 0 0 0 0 transparent; }
}

/* ======= MAIN ======= */
.main {
  padding: 0;
  min-width: 0;
}
.topbar {
  display: flex; align-items: center; gap: 14px;
  padding: 14px var(--pad);
  border-bottom: 1px solid var(--border);
  position: sticky; top: 0;
  background: var(--bg);
  z-index: 10;
  backdrop-filter: blur(10px);
}
.topbar-title {
  font-size: 18px;
  font-weight: 600;
  letter-spacing: -0.01em;
}
.topbar-title small {
  color: var(--text-muted);
  font-weight: 400;
  margin-left: 10px;
  font-size: 13px;
}
.topbar .spacer { flex: 1; }
.chip {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 4px 10px;
  border-radius: 999px;
  background: var(--bg-elev);
  border: 1px solid var(--border);
  font-size: 12px;
  color: var(--text-muted);
  font-weight: 500;
}
.chip.mono { font-size: 11.5px; }
.chip-dot { width: 6px; height: 6px; border-radius: 999px; background: var(--text-dim); }
.chip.pos .chip-dot { background: var(--pos); }
.chip.warn .chip-dot { background: var(--warn); }
.chip.neg .chip-dot { background: var(--neg); }
.chip.accent .chip-dot { background: var(--accent); }

.btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 7px 12px;
  border-radius: var(--radius-sm);
  background: var(--bg-elev);
  border: 1px solid var(--border);
  color: var(--text);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  font-family: inherit;
  transition: background 0.12s, border-color 0.12s;
}
.btn:hover { background: var(--bg-elev-2); border-color: var(--border-strong); }
.btn.ghost {
  background: transparent;
  border-color: transparent;
  color: var(--text-muted);
}
.btn.ghost:hover { color: var(--text); background: var(--bg-elev); }
.btn.sm { padding: 4px 8px; font-size: 12px; }
.btn.xs { padding: 2px 6px; font-size: 11px; }

.icon-btn {
  width: 32px; height: 32px;
  display: inline-flex; align-items: center; justify-content: center;
  border-radius: var(--radius-sm);
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text-muted);
  cursor: pointer;
  transition: all 0.12s;
}
.icon-btn:hover { color: var(--text); background: var(--bg-elev); }

.content {
  padding: var(--pad);
  display: flex; flex-direction: column;
  gap: var(--gap);
  max-width: 1600px;
}

/* ======= CARD ======= */
.card {
  background: var(--bg-elev);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
}
.card-head {
  display: flex; align-items: center; gap: 10px;
  padding: 14px 16px 10px;
}
.card-title {
  font-size: 13px;
  font-weight: 600;
  color: var(--text);
  letter-spacing: -0.005em;
}
.card-subtitle {
  font-size: 12px;
  color: var(--text-muted);
  margin-left: 6px;
  font-weight: 400;
}
.card-head .spacer { flex: 1; }
.card-body { padding: 0 16px 16px; }
.card-body.flush { padding: 0; }

/* ======= HERO GRID ======= */
.hero {
  display: grid;
  grid-template-columns: 1.45fr 1fr 1fr;
  gap: var(--gap);
}
.hero-big {
  background: var(--bg-elev);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 22px 24px;
  position: relative;
  overflow: hidden;
  display: flex; flex-direction: column;
  gap: 14px;
}
.hero-big .h-label {
  display: flex; align-items: center; gap: 10px;
  font-size: 12px;
  color: var(--text-muted);
  letter-spacing: 0.02em;
  text-transform: uppercase;
}
.hero-big .h-value {
  font-size: 44px;
  font-weight: 500;
  letter-spacing: -0.03em;
  line-height: 1;
  font-feature-settings: 'tnum' 1;
  font-variant-numeric: tabular-nums;
  font-family: 'Inter Tight', sans-serif;
}
.hero-big .h-value .frac { color: var(--text-muted); font-size: 26px; }
.hero-big .h-sub {
  font-size: 13px; color: var(--text-muted);
  display: flex; align-items: center; gap: 10px;
}
.hero-big .spark {
  margin-top: auto;
}

.stat {
  background: var(--bg-elev);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px 18px;
  display: flex; flex-direction: column;
  gap: 6px;
}
.stat .s-label {
  font-size: 11.5px;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.04em;
  font-weight: 500;
}
.stat .s-value {
  font-size: 24px;
  font-weight: 600;
  letter-spacing: -0.02em;
  font-feature-settings: 'tnum' 1;
  font-variant-numeric: tabular-nums;
}
.stat .s-sub {
  font-size: 12px;
  color: var(--text-muted);
  margin-top: auto;
}

.pos-val { color: var(--pos); }
.neg-val { color: var(--neg); }

.delta {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 1px 7px;
  border-radius: 4px;
  font-size: 12px;
  font-weight: 500;
  font-family: 'JetBrains Mono', monospace;
}
.delta.pos { background: var(--pos-soft); color: var(--pos); }
.delta.neg { background: var(--neg-soft); color: var(--neg); }
.delta.flat { background: var(--bg-elev-2); color: var(--text-muted); }

/* ======= GRID LAYOUTS ======= */
.row-2 { display: grid; grid-template-columns: 1.5fr 1fr; gap: var(--gap); }
.row-equity { display: grid; grid-template-columns: 2fr 1fr; gap: var(--gap); }
.row-2-eq { display: grid; grid-template-columns: 1fr 1fr; gap: var(--gap); }

/* ======= TABLE ======= */
.table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
}
.table thead th {
  text-align: left;
  font-weight: 500;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--text-dim);
  padding: 8px 16px;
  border-bottom: 1px solid var(--border);
  background: var(--bg-elev-2);
  position: sticky; top: 0;
}
.table tbody td {
  padding: 10px 16px;
  border-bottom: 1px solid var(--border);
  vertical-align: middle;
  height: var(--row-h);
}
.table tbody tr { transition: background 0.1s; cursor: pointer; }
.table tbody tr:hover { background: var(--bg-elev-2); }
.table tbody tr.expanded { background: var(--bg-elev-2); }
.table tbody tr.expanded + tr.detail-row td { background: var(--bg-elev-2); }
.table tbody tr:last-child td { border-bottom: 0; }
.table .num, .table .mono { font-family: 'JetBrains Mono', monospace; font-variant-numeric: tabular-nums; }
.table .num { text-align: right; }

.pill {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 2px 8px;
  border-radius: 4px;
  font-size: 11px;
  font-weight: 500;
  background: var(--bg-elev-2);
  color: var(--text-muted);
  border: 1px solid var(--border);
  letter-spacing: 0.01em;
}
.pill.strat { font-family: 'JetBrains Mono', monospace; font-size: 10.5px; }
.pill.side-yes { color: var(--pos); background: var(--pos-soft); border-color: transparent; }
.pill.side-no { color: var(--neg); background: var(--neg-soft); border-color: transparent; }
.pill.status-open { color: var(--accent); background: var(--accent-soft); border-color: transparent; }
.pill.status-won { color: var(--pos); background: var(--pos-soft); border-color: transparent; }
.pill.status-lost { color: var(--neg); background: var(--neg-soft); border-color: transparent; }
.pill.status-exited { color: var(--warn); background: var(--warn-soft); border-color: transparent; }
.pill.status-stale { color: var(--text-dim); }
.pill.status-disabled { color: var(--text-dim); background: transparent; }

/* ======= SPARKLINES ======= */
.spark {
  width: 100%;
  height: 60px;
  overflow: visible;
}
.spark-line {
  fill: none;
  stroke: var(--accent);
  stroke-width: 1.75;
  stroke-linejoin: round;
  stroke-linecap: round;
}
.spark-fill { fill: var(--accent-soft); }
.spark-axis { stroke: var(--border); stroke-width: 1; stroke-dasharray: 2 3; }
.spark-grid { stroke: var(--border); stroke-width: 0.5; }
.spark-dot { fill: var(--accent); }

/* ======= STRATEGY ROW ======= */
.strat-row {
  display: grid;
  grid-template-columns: 180px 1fr 90px 90px 90px 90px;
  gap: 12px;
  padding: 12px 16px;
  border-bottom: 1px solid var(--border);
  align-items: center;
  font-size: 13px;
  transition: background 0.12s;
}
.strat-row:hover { background: var(--bg-elev-2); }
.strat-row:last-child { border-bottom: 0; }
.strat-name {
  display: flex; flex-direction: column; gap: 2px;
}
.strat-name b {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  font-weight: 500;
  letter-spacing: -0.01em;
}
.strat-name span {
  font-size: 11.5px;
  color: var(--text-muted);
  font-weight: 400;
}
.strat-bar {
  height: 6px;
  background: var(--bg-elev-2);
  border-radius: 999px;
  overflow: hidden;
  position: relative;
}
.strat-bar .fill {
  height: 100%;
  background: var(--accent);
  border-radius: 999px;
  transition: width 0.4s ease;
}
.strat-bar .fill.pos { background: var(--pos); }
.strat-bar .fill.neg { background: var(--neg); }
.strat-num { text-align: right; font-family: 'JetBrains Mono', monospace; font-size: 12.5px; font-variant-numeric: tabular-nums; }

/* ======= LIVE WATCHER ======= */
.live-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 10px;
  padding: 0;
}
.live-card {
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 14px;
  background: var(--bg-elev-2);
  display: flex; flex-direction: column;
  gap: 10px;
}
.live-head {
  display: flex; align-items: center; justify-content: space-between;
  font-size: 12px;
  color: var(--text-muted);
}
.live-match {
  font-size: 14px;
  font-weight: 600;
  letter-spacing: -0.01em;
}
.live-teams { display: flex; align-items: center; gap: 8px; }
.live-vs { color: var(--text-dim); font-size: 12px; }
.live-leader {
  display: flex; align-items: center; justify-content: space-between;
  padding-top: 8px;
  border-top: 1px solid var(--border);
}
.live-price {
  font-family: 'JetBrains Mono', monospace;
  font-size: 22px;
  font-weight: 500;
  letter-spacing: -0.02em;
}
.live-price small { color: var(--text-muted); font-size: 13px; font-weight: 400; }
.live-spark { height: 36px; width: 100%; }
.live-meta {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
  font-size: 11.5px;
}
.live-meta > div { display: flex; flex-direction: column; gap: 2px; }
.live-meta .k { color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.04em; font-size: 10px; }
.live-meta .v { font-family: 'JetBrains Mono', monospace; font-size: 12.5px; }

/* ======= EQUITY CURVE ======= */
.equity-wrap { padding: 10px 16px 16px; }
.equity-chart { width: 100%; height: 220px; }
.equity-axis-label { font-size: 10px; fill: var(--text-dim); font-family: 'JetBrains Mono', monospace; }

/* ======= CLV ======= */
.clv-bar-row {
  display: grid;
  grid-template-columns: 180px 1fr 100px;
  gap: 10px; align-items: center;
  padding: 10px 16px;
  border-bottom: 1px solid var(--border);
  font-size: 12.5px;
}
.clv-bar-row:last-child { border: 0; }
.clv-bar {
  position: relative;
  height: 22px;
  background: var(--bg-elev-2);
  border-radius: 4px;
}
.clv-bar .center {
  position: absolute; top: 0; bottom: 0;
  left: 50%; width: 1px; background: var(--border-strong);
}
.clv-bar .fill {
  position: absolute; top: 3px; bottom: 3px;
  border-radius: 3px;
}

/* ======= ACTIVITY FEED ======= */
.feed { padding: 0; }
.feed-item {
  display: grid;
  grid-template-columns: 70px 1fr auto;
  gap: 14px;
  padding: 10px 16px;
  border-bottom: 1px solid var(--border);
  align-items: center;
  font-size: 13px;
}
.feed-item:last-child { border: 0; }
.feed-time { color: var(--text-dim); font-family: 'JetBrains Mono', monospace; font-size: 11.5px; }
.feed-msg { color: var(--text); }
.feed-msg .dim { color: var(--text-muted); }
.feed-msg .ticker { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--text-muted); }
.feed-amt { font-family: 'JetBrains Mono', monospace; font-size: 12.5px; font-weight: 500; }
.feed-icon {
  width: 20px; height: 20px;
  border-radius: 4px;
  display: inline-flex; align-items: center; justify-content: center;
  font-size: 10px;
  font-family: 'JetBrains Mono', monospace;
  background: var(--bg-elev-2);
  color: var(--text-muted);
}
.feed-icon.win { background: var(--pos-soft); color: var(--pos); }
.feed-icon.loss { background: var(--neg-soft); color: var(--neg); }
.feed-icon.open { background: var(--accent-soft); color: var(--accent); }
.feed-icon.sys { background: var(--bg-elev-2); color: var(--text-dim); }

/* ======= EXPAND DETAIL ======= */
.expand {
  padding: 14px 16px 16px 44px;
  background: var(--bg-elev-2);
  border-bottom: 1px solid var(--border);
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 16px;
  font-size: 12px;
}
.expand-block { display: flex; flex-direction: column; gap: 4px; }
.expand-block .k { color: var(--text-dim); text-transform: uppercase; font-size: 10px; letter-spacing: 0.05em; }
.expand-block .v { font-family: 'JetBrains Mono', monospace; font-size: 12.5px; color: var(--text); }

/* ======= PENDING CARD ======= */
.pending-card {
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 12px 14px;
  display: flex; flex-direction: column;
  gap: 10px;
  background: var(--bg-elev-2);
}
.pending-card h4 {
  margin: 0;
  font-size: 13px;
  font-weight: 600;
  letter-spacing: -0.005em;
}
.pending-card .ticker { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--text-muted); }
.pending-meta {
  display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px;
  font-size: 11px;
}
.pending-meta .k { color: var(--text-dim); text-transform: uppercase; font-size: 9.5px; letter-spacing: 0.05em; }
.pending-meta .v { font-family: 'JetBrains Mono', monospace; font-size: 12px; margin-top: 2px; }

/* ======= TWEAKS PANEL ======= */
.tweaks-panel {
  position: fixed;
  right: 20px; bottom: 20px;
  width: 280px;
  background: var(--bg-elev);
  border: 1px solid var(--border-strong);
  border-radius: var(--radius);
  padding: 16px;
  z-index: 100;
  box-shadow: 0 10px 40px rgba(0,0,0,0.4);
  display: flex; flex-direction: column; gap: 14px;
}
.tweaks-head {
  display: flex; align-items: center; justify-content: space-between;
}
.tweaks-head h3 {
  margin: 0;
  font-size: 13px;
  font-weight: 600;
  letter-spacing: -0.005em;
}
.tweaks-row { display: flex; flex-direction: column; gap: 6px; }
.tweaks-row .k { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; }
.tweaks-swatches { display: flex; gap: 8px; }
.swatch {
  width: 28px; height: 28px; border-radius: 999px;
  border: 2px solid var(--border-strong);
  cursor: pointer;
  transition: all 0.12s;
}
.swatch:hover { transform: scale(1.08); }
.swatch.active { border-color: var(--text); }
.seg {
  display: grid; grid-template-columns: repeat(3, 1fr);
  background: var(--bg-elev-2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 2px;
  gap: 2px;
}
.seg button {
  background: transparent; border: 0;
  padding: 6px 0;
  color: var(--text-muted);
  font-family: inherit;
  font-size: 12px;
  font-weight: 500;
  border-radius: 4px;
  cursor: pointer;
}
.seg button.active { background: var(--bg-elev); color: var(--text); box-shadow: var(--shadow); }

/* ======= MISC ======= */
.divider { height: 1px; background: var(--border); }
.kbd {
  display: inline-block;
  padding: 1px 6px;
  border-radius: 4px;
  background: var(--bg-elev-2);
  border: 1px solid var(--border);
  font-family: 'JetBrains Mono', monospace;
  font-size: 10.5px;
  color: var(--text-muted);
}

.filterbar {
  display: flex; gap: 6px;
  padding: 10px 16px;
  border-bottom: 1px solid var(--border);
  background: var(--bg-elev);
  align-items: center;
}
.filterbar input {
  flex: 1;
  background: transparent;
  border: 0;
  outline: none;
  color: var(--text);
  font-size: 13px;
  font-family: inherit;
  padding: 4px 8px;
}
.filterbar input::placeholder { color: var(--text-dim); }
.filter-btn {
  padding: 4px 10px;
  border-radius: 999px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text-muted);
  font-size: 12px;
  cursor: pointer;
  font-family: inherit;
  transition: all 0.12s;
}
.filter-btn:hover { color: var(--text); }
.filter-btn.active { background: var(--bg-elev-2); color: var(--text); border-color: var(--border-strong); }

.scroll { max-height: 420px; overflow-y: auto; }
.scroll::-webkit-scrollbar { width: 8px; }
.scroll::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 4px; }

.empty {
  padding: 40px 16px;
  text-align: center;
  color: var(--text-dim);
  font-size: 13px;
}

.err-banner {
  margin: var(--pad) var(--pad) 0;
  background: var(--neg-soft);
  border: 1px solid var(--neg);
  color: var(--neg);
  border-radius: var(--radius-sm);
  padding: 10px 14px;
  font-size: 12.5px;
  font-family: 'JetBrains Mono', monospace;
}

@media (max-width: 960px) {
  .app { grid-template-columns: 1fr; }
  .sidebar { display: none; }
  .hero { grid-template-columns: 1fr; }
  .row-equity, .row-2, .row-2-eq { grid-template-columns: 1fr; }
}
</style>

<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" data-presets="react">
(function(){
const { useState, useEffect, useMemo, useRef, Fragment } = React;

// ============================================================
// Helpers
// ============================================================
const money = (n, sign = false) => {
  if (n == null || !isFinite(n)) return "—";
  const s = n < 0 ? "-" : (sign && n > 0 ? "+" : "");
  return s + "$" + Math.abs(n).toFixed(2);
};
const pct = (n, decimals = 1, sign = false) => {
  if (n == null || !isFinite(n)) return "—";
  const s = n < 0 ? "-" : (sign && n > 0 ? "+" : "");
  return s + Math.abs(n * 100).toFixed(decimals) + "%";
};
const cents = (n, sign = false) => {
  if (n == null || !isFinite(n)) return "—";
  const s = n < 0 ? "-" : (sign && n > 0 ? "+" : "");
  return s + Math.abs(n).toFixed(1) + "¢";
};
const relTime = (iso) => {
  if (!iso) return "—";
  const d = new Date(iso);
  if (!isFinite(d.getTime())) return "—";
  const diffMs = Date.now() - d.getTime();
  const m = Math.floor(diffMs / 60000);
  if (m < 1) return "just now";
  if (m < 60) return m + "m ago";
  const h = Math.floor(m / 60);
  if (h < 24) return h + "h ago";
  return Math.floor(h / 24) + "d ago";
};
const relFutureStr = (iso) => {
  if (!iso) return "—";
  const d = new Date(iso);
  if (!isFinite(d.getTime())) return "—";
  let diffMs = d.getTime() - Date.now();
  if (diffMs <= 0) return "expired";
  const m = Math.floor(diffMs / 60000);
  if (m < 60) return m + "m";
  const h = Math.floor(m / 60);
  const rm = m - h * 60;
  if (h < 24) return h + "h " + String(rm).padStart(2, "0") + "m";
  return Math.floor(h / 24) + "d";
};
const shortTicker = (t) => t || "";
const cleanTitle = (t) => (t || "").replace(/\*\*/g, "");
const safe = (n, d = 0) => (n == null || !isFinite(n) ? d : n);

// ============================================================
// Data fetching
// ============================================================
const STATE_BASE = "./state/";
async function fetchJSON(name) {
  try {
    const r = await fetch(STATE_BASE + name + "?t=" + Date.now());
    if (!r.ok) return null;
    return await r.json();
  } catch (_) { return null; }
}
async function fetchText(name) {
  try {
    const r = await fetch(STATE_BASE + name + "?t=" + Date.now());
    if (!r.ok) return null;
    return await r.text();
  } catch (_) { return null; }
}
async function loadAll() {
  const [bot_state, paper_trades, positions, pending, strategy_audit, clv, ticks_text] =
    await Promise.all([
      fetchJSON("bot_state.json"),
      fetchJSON("paper_trades.json"),
      fetchJSON("positions.json"),
      fetchJSON("pending.json"),
      fetchJSON("strategy_audit.json"),
      fetchJSON("clv.json"),
      fetchText("live_ticks.jsonl"),
    ]);
  return { bot_state, paper_trades, positions, pending, strategy_audit, clv, ticks_text };
}

// ============================================================
// Derived computations
// ============================================================
const PAPER_START = 500;

function computePaperBalance(trades) {
  let bal = PAPER_START;
  for (const t of trades || []) {
    const cost = (t.contracts || 0) * (t.entry_price || 0);
    if      (t.status === "open")         bal -= cost;
    else if (t.status === "won")          { bal -= cost; bal += (t.contracts || 0) * 1.0; }
    else if (t.status === "lost")         bal -= cost;
    else if (t.status === "exited_early") { bal -= cost; bal += (t.contracts || 0) * (t.exit_price || 0); }
  }
  return +bal.toFixed(2);
}

function buildEquityCurve(trades) {
  const resolved = (trades || [])
    .filter(t => ["won", "lost", "exited_early"].includes(t.status) && t.resolved_at)
    .sort((a, b) => new Date(a.resolved_at) - new Date(b.resolved_at));
  const byDay = new Map();
  let running = PAPER_START;
  for (const t of resolved) {
    running += (t.pnl || 0);
    const key = (t.resolved_at || "").slice(0, 10);
    byDay.set(key, running);
  }
  const now = new Date();
  const curve = [];
  let lastBal = PAPER_START;
  for (let i = 6; i >= 0; i--) {
    const d = new Date(now);
    d.setDate(now.getDate() - i);
    const key = d.toISOString().slice(0, 10);
    if (byDay.has(key)) lastBal = byDay.get(key);
    const label = d.toLocaleDateString("en-US", { month: "short", day: "numeric" });
    curve.push({ date: label, balance: +lastBal.toFixed(2), key });
  }
  return curve;
}

function transformPositions(positions) {
  return (positions || [])
    .filter(p => p && p.paper && (p.filled || 0) > 0 && ["filled", "partial"].includes(p.status))
    .map(p => {
      const entry = (p.price_cents || 0) / 100;
      const liveSports = ["nba", "nhl", "mlb", "atp", "wta", "ufc", "tennis", "boxing", "ncaab", "ncaaf", "atp_challenger"];
      return {
        ticker: p.ticker,
        title: cleanTitle(p.title),
        side: p.side || "",
        strategy: p.opp_type || p.type || "",
        contracts: p.filled || p.contracts || 0,
        entry,
        cost: p.cost || 0,
        current_bid: p.current_bid != null ? p.current_bid : entry,
        unreal_pnl: p.unrealized_pnl || 0,
        unreal_pct: p.pnl_percent || 0,
        edge: p.edge || 0,
        relative_edge: p.relative_edge || 0,
        opened_at: p.opened_at,
        event_ticker: p.event_ticker,
        live: !!(p.sport && liveSports.includes(p.sport)),
      };
    });
}

function transformPending(items) {
  return (items || []).map(p => {
    const opp = p.opp || {};
    const market = opp.market || {};
    const rawTitle = opp.title || market.title || p.ticker || "";
    const strategy = opp.source_type || opp.type || p.type || "";
    const side = p.recommended_side || opp.recommended_side || null;
    const yes_ask = market.yes_ask != null ? market.yes_ask : (opp.yes_ask != null ? opp.yes_ask : null);
    const no_ask  = market.no_ask  != null ? market.no_ask  : (opp.no_ask  != null ? opp.no_ask  : null);
    const edge = p.edge != null ? p.edge : (opp.edge != null ? opp.edge : null);
    const rel_edge = p.relative_edge != null ? p.relative_edge : (opp.relative_edge != null ? opp.relative_edge : null);
    const size = (opp.sizing && opp.sizing.contracts) || opp.contracts || null;
    let cost = null;
    if (size != null) {
      const ask = side === "no" ? no_ask : yes_ask;
      if (ask != null) cost = +(size * ask / 100).toFixed(2);
    }
    return {
      id: p.opp_id || p.ticker,
      ticker: p.ticker,
      title: cleanTitle(rawTitle),
      strategy,
      side,
      yes_ask, no_ask,
      edge, rel_edge,
      size, cost,
      expires_in: relFutureStr(p.expires_at || market.close_time),
      opp_type: p.type,
    };
  });
}

function buildSummary(trades, positions, clv, audit) {
  const balance = computePaperBalance(trades);
  const active = (positions || []).filter(p =>
    p && p.paper && (p.filled || 0) > 0 && ["filled", "partial"].includes(p.status));
  const openExposure = +active.reduce((s, p) => s + (p.cost || 0), 0).toFixed(2);
  const resolved = (trades || []).filter(t => ["won", "lost"].includes(t.status));
  const wins = resolved.filter(t => t.status === "won").length;
  const losses = resolved.filter(t => t.status === "lost").length;
  const exited = (trades || []).filter(t => t.status === "exited_early").length;
  const winRate = resolved.length ? wins / resolved.length : null;
  const today = new Date().toISOString().slice(0, 10);
  const closedAll = (trades || []).filter(t => ["won", "lost", "exited_early"].includes(t.status));
  const closedToday = closedAll.filter(t => (t.resolved_at || "").slice(0, 10) === today);
  const realizedToday = +closedToday.reduce((s, t) => s + (t.pnl || 0), 0).toFixed(2);
  const realizedAll = +closedAll.reduce((s, t) => s + (t.pnl || 0), 0).toFixed(2);
  const winsToday = closedToday.filter(t => t.status === "won").length;
  const lossesToday = closedToday.filter(t => t.status === "lost").length;
  const exitedToday = closedToday.filter(t => t.status === "exited_early").length;

  const clvValid = (clv || []).filter(r => r.status === "settled" && typeof r.clv_cents === "number");
  const avgClv = clvValid.length ? clvValid.reduce((s, r) => s + r.clv_cents, 0) / clvValid.length : null;
  const beatRate = clvValid.length ? clvValid.filter(r => r.clv_cents > 0).length / clvValid.length : null;

  const strats = (audit && audit.strategies) || {};
  let activeStrats = 0, disabledStrats = 0;
  for (const v of Object.values(strats)) {
    if ((v.status || "").toUpperCase().startsWith("ACTIVE")) activeStrats++;
    else disabledStrats++;
  }

  return {
    paper_balance: balance,
    open_exposure: openExposure,
    open_positions: active.length,
    realized_today: realizedToday,
    realized_all: realizedAll,
    settled_trades: wins + losses + exited,
    wins, losses, exited_early: exited,
    wins_today: winsToday, losses_today: lossesToday, exited_today: exitedToday,
    win_rate: winRate,
    clv_avg_cents: avgClv,
    clv_beat_rate: beatRate,
    active_strategies: activeStrats,
    disabled_strategies: disabledStrats,
  };
}

function buildClvByStrat(clv) {
  const valid = (clv || []).filter(r => r.status === "settled" && typeof r.clv_cents === "number");
  const by = {};
  for (const r of valid) {
    const k = r.opp_type || "unknown";
    if (!by[k]) by[k] = { strategy: k, trades: 0, sum: 0, beat: 0 };
    by[k].trades++;
    by[k].sum += r.clv_cents;
    if (r.clv_cents > 0) by[k].beat++;
  }
  return Object.values(by)
    .map(d => ({
      strategy: d.strategy,
      trades: d.trades,
      avg_clv: d.trades ? d.sum / d.trades : null,
      beat_rate: d.trades ? d.beat / d.trades : null,
    }))
    .sort((a, b) => b.trades - a.trades);
}

function parseWrString(s) {
  if (typeof s === "number") return s;
  if (typeof s !== "string") return null;
  const m = s.match(/\((\d+(?:\.\d+)?)%\)/);
  if (m) return parseFloat(m[1]) / 100;
  const m2 = s.match(/^(\d+)\s*\/\s*(\d+)/);
  if (m2) {
    const tot = parseInt(m2[2], 10);
    return tot ? parseInt(m2[1], 10) / tot : null;
  }
  return null;
}

function buildStrategyRows(audit, clv) {
  const strats = (audit && audit.strategies) || {};
  const clvBy = {};
  for (const d of buildClvByStrat(clv)) clvBy[d.strategy] = d;
  const rows = [];
  for (const [id, s] of Object.entries(strats)) {
    const statusRaw = (s.status || "").toUpperCase();
    const status = statusRaw.startsWith("ACTIVE") ? "active" : "disabled";
    rows.push({
      id,
      name: id,
      description: s.description || "",
      status,
      status_raw: s.status,
      real_trades: s.real_trades || 0,
      real_pnl: s.real_pnl || 0,
      real_wins: s.real_wins || 0,
      real_losses: s.real_losses || 0,
      real_wr: parseWrString(s.real_wr),
      open_positions: s.open_positions || 0,
      open_cost: s.open_cost || 0,
      avg_clv: clvBy[id] ? clvBy[id].avg_clv : null,
      clv_beat: clvBy[id] ? clvBy[id].beat_rate : null,
    });
  }
  rows.sort((a, b) => {
    if (a.status !== b.status) return a.status === "active" ? -1 : 1;
    return (b.real_trades || 0) - (a.real_trades || 0);
  });
  return rows;
}

function buildSettlements(trades) {
  const out = [];
  for (const t of trades || []) {
    if (!["won", "lost", "exited_early"].includes(t.status)) continue;
    const contracts = t.contracts || 0;
    const entry = t.entry_price || 0;
    const exit = t.exit_price || 0;
    let pnl = t.pnl;
    if (pnl == null) {
      if (t.status === "won") pnl = contracts * (1 - entry);
      else if (t.status === "lost") pnl = -(contracts * entry);
      else pnl = contracts * (exit - entry);
    }
    out.push({
      ticker: t.ticker,
      title: t.title,
      strategy: t.strategy || t.opp_type || t.type,
      side: t.side,
      result: t.status === "exited_early" ? "exited_early" : t.status,
      pnl: +Number(pnl || 0).toFixed(2),
      contracts,
      resolved_at: t.resolved_at,
    });
  }
  out.sort((a, b) => new Date(b.resolved_at || 0) - new Date(a.resolved_at || 0));
  return out;
}

function buildActivity(trades, audit, bot_state) {
  const now = Date.now();
  const cutoff = now - 24 * 3600 * 1000;
  const items = [];
  for (const t of trades || []) {
    if (!["won", "lost", "exited_early"].includes(t.status)) continue;
    if (!t.resolved_at) continue;
    const ts = new Date(t.resolved_at).getTime();
    if (!isFinite(ts) || ts < cutoff) continue;
    const kind = t.status === "won" ? "win" : (t.status === "lost" ? "loss" : "sys");
    const msg = t.status === "won" ? "Settled" : (t.status === "lost" ? "Settled" : "Exited");
    items.push({
      ts,
      t: new Date(ts).toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" }),
      kind, msg,
      ticker: shortTicker(t.ticker),
      strategy: t.type || null,
      amt: t.pnl != null ? t.pnl : null,
    });
  }
  if (bot_state && bot_state.last_scan) {
    const ts = new Date(bot_state.last_scan).getTime();
    if (isFinite(ts) && ts > cutoff) {
      items.push({
        ts,
        t: new Date(ts).toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" }),
        kind: "sys",
        msg: "Scan cycle complete",
        ticker: null, strategy: null, amt: null,
      });
    }
  }
  if (bot_state && bot_state.dk_disabled && bot_state.dk_disabled_until) {
    const until = new Date(bot_state.dk_disabled_until * 1000);
    items.push({
      ts: now - 60000,
      t: new Date().toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" }),
      kind: "sys",
      msg: "DK disabled until " + until.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" }),
      ticker: null, strategy: null, amt: null,
    });
  }
  items.sort((a, b) => b.ts - a.ts);
  return items.slice(0, 20);
}

function buildLiveCards(ticksText) {
  if (!ticksText) return [];
  const now = Date.now();
  const cutoff = now - 5 * 60 * 1000;
  const lines = ticksText.trim().split("\n");
  const slice = lines.slice(Math.max(0, lines.length - 800));
  const byTicker = new Map();
  for (const line of slice) {
    let tick;
    try { tick = JSON.parse(line); } catch (_) { continue; }
    if (!tick || !tick.ticker) continue;
    const ts = new Date(tick.ts).getTime();
    if (!isFinite(ts)) continue;
    let g = byTicker.get(tick.ticker);
    if (!g) { g = { latest: null, latestTs: 0, history: [] }; byTicker.set(tick.ticker, g); }
    g.history.push(tick.price);
    if (ts > g.latestTs) { g.latest = tick; g.latestTs = ts; }
  }
  const cards = [];
  for (const [ticker, g] of byTicker.entries()) {
    if (!g.latest || g.latestTs < cutoff) continue;
    const t = g.latest;
    const parts = ticker.split("-");
    const leaderCode = parts[parts.length - 1];
    const match = cleanTitle((t.match || "").replace(/Will the |Will /, "").replace(/\?$/, ""));
    let score = null;
    if (t.score_diff != null && t.period != null) score = "Δ" + t.score_diff + " · P" + t.period;
    const pricesRaw = g.history.filter(v => typeof v === "number");
    const history = pricesRaw.slice(-12);
    cards.push({
      ticker,
      match: match.slice(0, 70) || ticker,
      sport: t.sport || "unk",
      leader: leaderCode,
      score,
      price: t.price,
      bid: t.bid,
      peak: t.recent_high,
      wp: t.wp != null ? t.wp : null,
      momentum: t.momentum != null ? t.momentum : 0,
      wp_edge: t.wp_edge != null ? t.wp_edge : null,
      completion: t.completion != null ? t.completion : 0,
      in_position: (t.holding || 0) > 0,
      history: history.length >= 2 ? history : null,
      ts: t.ts,
    });
  }
  cards.sort((a, b) => {
    if (a.in_position !== b.in_position) return a.in_position ? -1 : 1;
    return new Date(b.ts) - new Date(a.ts);
  });
  return cards;
}

function buildDailyStats(trades, curve) {
  const byDay = new Map();
  for (const t of trades || []) {
    if (!["won", "lost", "exited_early"].includes(t.status)) continue;
    if (!t.resolved_at) continue;
    const d = t.resolved_at.slice(0, 10);
    byDay.set(d, (byDay.get(d) || 0) + (t.pnl || 0));
  }
  let best = null, worst = null;
  for (const [d, v] of byDay.entries()) {
    if (best == null || v > best.v) best = { d, v };
    if (worst == null || v < worst.v) worst = { d, v };
  }
  let peak = PAPER_START, dd = 0;
  for (const p of curve || []) {
    if (p.balance > peak) peak = p.balance;
    const cur = peak ? (p.balance - peak) / peak : 0;
    if (cur < dd) dd = cur;
  }
  const fmtDay = (d) => d ? new Date(d + "T12:00:00").toLocaleDateString("en-US", { month: "short", day: "numeric" }) : null;
  return {
    best: best ? { label: fmtDay(best.d), v: best.v } : null,
    worst: worst ? { label: fmtDay(worst.d), v: worst.v } : null,
    drawdown: dd,
  };
}

const Delta = ({ value, format = "money" }) => {
  if (value == null || value === 0 || !isFinite(value)) return <span className="delta flat mono">—</span>;
  const cls = value > 0 ? "pos" : "neg";
  const arrow = value > 0 ? "▲" : "▼";
  const text = format === "pct" ? pct(value, 2, false) : money(value, false);
  return <span className={"delta " + cls}>{arrow} {text}</span>;
};

const Sparkline = ({ data, width = 480, height = 60, color, fill = true, showDot = true }) => {
  if (!data || data.length < 2) return null;
  const min = Math.min(...data);
  const max = Math.max(...data);
  const range = max - min || 1;
  const stepX = width / (data.length - 1);
  const points = data.map((v, i) => [i * stepX, height - ((v - min) / range) * height]);
  const pathD = points.map(([x, y], i) => (i === 0 ? "M" : "L") + x.toFixed(1) + " " + y.toFixed(1)).join(" ");
  const fillD = pathD + ` L ${width} ${height} L 0 ${height} Z`;
  const last = points[points.length - 1];
  return (
    <svg className="spark" viewBox={`0 0 ${width} ${height}`} preserveAspectRatio="none">
      {fill && <path d={fillD} className="spark-fill" style={color ? { fill: color + "22" } : {}} />}
      <path d={pathD} className="spark-line" style={color ? { stroke: color } : {}} />
      {showDot && <circle className="spark-dot" cx={last[0]} cy={last[1]} r="2.5" style={color ? { fill: color } : {}} />}
    </svg>
  );
};

const EquityChart = ({ data, height = 220 }) => {
  if (!data || data.length < 2) return <div className="empty">No balance history yet</div>;
  const pad = { top: 20, right: 40, bottom: 28, left: 48 };
  const width = 700;
  const w = width - pad.left - pad.right;
  const h = height - pad.top - pad.bottom;
  const vals = data.map(d => d.balance);
  const min = Math.min(...vals, PAPER_START) - 5;
  const max = Math.max(...vals, PAPER_START) + 5;
  const range = max - min || 1;
  const stepX = w / (data.length - 1);
  const points = data.map((d, i) => ({
    x: pad.left + i * stepX,
    y: pad.top + h - ((d.balance - min) / range) * h,
    d,
  }));
  const pathD = points.map((p, i) => (i === 0 ? "M" : "L") + p.x + " " + p.y).join(" ");
  const fillD = pathD + ` L ${points[points.length - 1].x} ${pad.top + h} L ${pad.left} ${pad.top + h} Z`;
  const baseY = pad.top + h - ((PAPER_START - min) / range) * h;
  const yTicks = [min, min + range * 0.25, min + range * 0.5, min + range * 0.75, max];
  return (
    <svg className="equity-chart" viewBox={`0 0 ${width} ${height}`} preserveAspectRatio="xMidYMid meet">
      {yTicks.map((v, i) => {
        const y = pad.top + h - ((v - min) / range) * h;
        return (
          <g key={i}>
            <line x1={pad.left} x2={pad.left + w} y1={y} y2={y} className="spark-grid" />
            <text x={pad.left - 8} y={y + 3} textAnchor="end" className="equity-axis-label">${v.toFixed(0)}</text>
          </g>
        );
      })}
      <line x1={pad.left} x2={pad.left + w} y1={baseY} y2={baseY} className="spark-axis" />
      <text x={pad.left + w + 6} y={baseY + 3} className="equity-axis-label" style={{ fill: "var(--text-dim)" }}>start $500</text>
      <path d={fillD} className="spark-fill" />
      <path d={pathD} className="spark-line" />
      {points.map((p, i) => <circle key={i} cx={p.x} cy={p.y} r="3" className="spark-dot" />)}
      {data.map((d, i) => (
        <text key={i} x={pad.left + i * stepX} y={height - 8} textAnchor="middle" className="equity-axis-label">{d.date}</text>
      ))}
    </svg>
  );
};

  <div className="tweaks-panel">
    <div className="tweaks-head">
      <h3>Tweaks</h3>
      <button className="icon-btn" onClick={onClose}><Icon name="x" /></button>
    </div>
    <div className="tweaks-row">
      <div className="k">Theme</div>
      <div className="seg">
        {["dark", "light"].map(t => (
          <button key={t} className={tweaks.theme === t ? "active" : ""} onClick={() => setTweaks({ ...tweaks, theme: t })}>{t}</button>
        ))}
      </div>
    </div>
    <div className="tweaks-row">
      <div className="k">Accent</div>
      <div className="tweaks-swatches">
        {[
          { id: "mint", color: "oklch(78% 0.14 170)" },
          { id: "violet", color: "oklch(72% 0.16 300)" },
          { id: "amber", color: "oklch(80% 0.14 75)" },
          { id: "sky", color: "oklch(76% 0.13 230)" },
        ].map(a => (
          <div key={a.id} className={"swatch" + (tweaks.accent === a.id ? " active" : "")}
            style={{ background: a.color }}
            onClick={() => setTweaks({ ...tweaks, accent: a.id })} />
        ))}
      </div>
    </div>
    <div className="tweaks-row">
      <div className="k">Density</div>
      <div className="seg">
        {["compact", "comfortable", "spacious"].map(d => (
          <button key={d} className={tweaks.density === d ? "active" : ""} onClick={() => setTweaks({ ...tweaks, density: d })}>{d}</button>
        ))}
      </div>
    </div>
  </div>
);

// ============================================================
// Pages
// ============================================================
const Overview = ({ derived, pending, activity, liveCards, strategies, clvByStrat, openPositions }) => {
  const summary = derived.summary;
  const equity = derived.equity;
  const dstats = derived.dailyStats;
  const spark7d = equity.map(d => d.balance);
  const netReturn = summary.paper_balance - PAPER_START;
  const netReturnPct = PAPER_START ? netReturn / PAPER_START : 0;
  const balWhole = Math.floor(summary.paper_balance);
  const balFrac = (summary.paper_balance - balWhole).toFixed(2).slice(2);
  return (
    <>
      <div className="hero">
        <div className="hero-big">
          <div className="h-label">Paper balance · USD <span className="pill" style={{ marginLeft: "auto" }}>$500 start</span></div>
          <div className="h-value">${balWhole}<span className="frac">.{balFrac}</span></div>
          <div className="h-sub">
            <Delta value={netReturn} />
            <Delta value={netReturnPct} format="pct" />
            <span style={{ color: "var(--text-dim)" }}>vs $500 start</span>
          </div>
          <div className="spark">
            <Sparkline data={spark7d} width={480} height={64} />
          </div>
        </div>
        <StatTile
          label="Realized · today"
          value={<span className={summary.realized_today >= 0 ? "pos-val" : "neg-val"}>{money(summary.realized_today, true)}</span>}
          sub={<>{summary.wins_today} wins · {summary.losses_today} losses · {summary.exited_today} cut</>}
        />
        <StatTile
          label="Open exposure"
          value={<>${summary.open_exposure.toFixed(0)}<span style={{ fontSize: 16, color: "var(--text-muted)", marginLeft: 6 }}>· {pct(summary.open_exposure / (summary.paper_balance || 1), 0)}</span></>}
          sub={<>{summary.open_positions} positions</>}
        />
        <StatTile
          label="Settled trades"
          value={<>{summary.settled_trades}<span style={{ fontSize: 16, color: "var(--text-muted)", marginLeft: 6 }}>· {summary.win_rate != null ? pct(summary.win_rate, 0) : "—"} wr</span></>}
          sub={<>CLV beat {summary.clv_beat_rate != null ? pct(summary.clv_beat_rate, 0) : "—"} · avg {summary.clv_avg_cents != null ? cents(summary.clv_avg_cents, true) : "—"}</>}
        />
        <StatTile
          label="Pending queue"
          value={pending.length}
          sub="new opportunities found"
        />
        <StatTile
          label="Scan health"
          value={<>{derived.scanCountShort}<span style={{ fontSize: 16, color: "var(--text-muted)", marginLeft: 6 }}>cycles</span></>}
          sub={<>last scan {relTime(derived.bot_state && derived.bot_state.last_scan)}</>}
        />
      </div>

      <div className="row-equity">
        <Card title="Balance · last 7 days" subtitle="realized only">
          <EquityChart data={equity} />
          <div style={{ display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: 12, padding: "12px 0 0", borderTop: "1px solid var(--border)" }}>
            <StatBit k="Net" v={money(summary.paper_balance - PAPER_START, true)} pos={summary.paper_balance >= PAPER_START} />
            <StatBit k="Best day" v={dstats.best ? money(dstats.best.v, true) : "—"} sub={dstats.best ? dstats.best.label : null} pos={dstats.best ? dstats.best.v >= 0 : null} />
            <StatBit k="Worst day" v={dstats.worst ? money(dstats.worst.v, true) : "—"} sub={dstats.worst ? dstats.worst.label : null} pos={dstats.worst ? dstats.worst.v >= 0 : null} />
            <StatBit k="Drawdown" v={pct(dstats.drawdown, 2)} sub="from peak" pos={dstats.drawdown >= 0} />
          </div>
        </Card>
        <Card title="Pending" subtitle={`${pending.length} found`}>
          <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
            {pending.slice(0, 3).map(op => <PendingCard key={op.id} op={op} />)}
            {pending.length === 0 && <div className="empty">Queue is empty</div>}
          </div>
        </Card>
      </div>

      <PositionsTable positions={openPositions} />

      <div className="row-2">
        <StrategiesList strategies={strategies} />
        <Card title="Activity" subtitle="last 24h" flush>
          <div className="feed scroll" style={{ maxHeight: 460 }}>
            {activity.length === 0 && <div className="empty">Nothing in the last 24 hours</div>}
            {activity.map((f, i) => <FeedItem key={i} f={f} />)}
          </div>
        </Card>
      </div>

      <div className="row-2-eq">
        <Card title="Live watcher" subtitle={`${liveCards.length} fresh ticker${liveCards.length === 1 ? "" : "s"}`}
          actions={<span className="chip mono pos"><span className="chip-dot" />10s tick</span>} flush>
          <div className="live-grid" style={{ padding: 14 }}>
            {liveCards.slice(0, 4).map(g => <LiveCard key={g.ticker} g={g} />)}
            {liveCards.length === 0 && <div className="empty" style={{ gridColumn: "1 / -1" }}>No live ticks in last 5 min</div>}
          </div>
        </Card>
        <Card title="CLV by strategy" subtitle="positive = market moved our way" flush>
          <CLVChart data={clvByStrat} />
          <div style={{ padding: "12px 16px", color: "var(--text-muted)", fontSize: 12, borderTop: "1px solid var(--border)" }}>
            <b style={{ color: "var(--text)" }}>Gate to live trading:</b> 50+ settled paper trades per strategy,
            avg CLV &gt; 0, beat rate &gt; 55%.
          </div>
        </Card>
      </div>
    </>
  );
};

const PendingPage = ({ pending }) => (
  <Card title="Pending opportunities" subtitle={`${pending.length} in queue`}>
    <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(320px, 1fr))", gap: 12 }}>
      {pending.map(op => <PendingCard key={op.id} op={op} />)}
      {pending.length === 0 && <div className="empty" style={{ gridColumn: "1 / -1" }}>Queue is empty — scans run on their own cadence</div>}
    </div>
  </Card>
);

const LivePage = ({ liveCards }) => (
  <Card title="Live watcher" subtitle="10s tick · last 5 min of activity" flush>
    <div className="live-grid" style={{ padding: 14 }}>
      {liveCards.map(g => <LiveCard key={g.ticker} g={g} />)}
      {liveCards.length === 0 && <div className="empty" style={{ gridColumn: "1 / -1" }}>No live ticks in last 5 min</div>}
    </div>
  </Card>
);

const HistoryPage = ({ settlements }) => {
  const [filter, setFilter] = useState("all");
  const filtered = settlements.filter(s => filter === "all" || s.result === filter);
  return (
    <Card title="Trade history" subtitle={`${filtered.length} settled`} flush>
      <div className="filterbar">
        {["all", "won", "lost", "exited_early"].map(f => (
          <button key={f} className={"filter-btn" + (filter === f ? " active" : "")} onClick={() => setFilter(f)}>{f === "exited_early" ? "exited" : f}</button>
        ))}
      </div>
      <div className="scroll">
        <table className="table">
          <thead>
            <tr>
              <th>When</th><th>Ticker</th><th>Strategy</th><th>Result</th>
              <th style={{ textAlign: "right" }}>Qty</th>
              <th style={{ textAlign: "right" }}>P&L</th>
            </tr>
          </thead>
          <tbody>
            {filtered.map((s, i) => <SettlementRow key={i} s={s} />)}
            {filtered.length === 0 && <tr><td colSpan={6} className="empty">No settlements in this bucket</td></tr>}
          </tbody>
        </table>
      </div>
    </Card>
  );
};

const CLVPage = ({ clvByStrat, summary }) => (
  <div className="row-2">
    <Card title="CLV by strategy" subtitle="positive = market moved our way" flush>
      <CLVChart data={clvByStrat} />
    </Card>
    <Card title="About CLV">
      <p style={{ color: "var(--text-muted)", fontSize: 13, lineHeight: 1.6, margin: "0 0 10px" }}>
        Closing-Line Value measures whether the market moved in your favor after entry —
        independent of whether you actually won. A strategy with positive average CLV has real edge.
        A strategy with negative CLV is getting lucky on wins or picking off illiquid contracts.
      </p>
      <div className="divider" style={{ margin: "10px 0" }} />
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
        <StatBit k="Avg CLV" v={summary.clv_avg_cents != null ? cents(summary.clv_avg_cents, true) : "—"} pos={summary.clv_avg_cents != null ? summary.clv_avg_cents > 0 : null} />
        <StatBit k="Beat rate" v={summary.clv_beat_rate != null ? pct(summary.clv_beat_rate, 0) : "—"} pos={summary.clv_beat_rate != null ? summary.clv_beat_rate > 0.5 : null} />
      </div>
    </Card>
  </div>
);

const HealthPage = ({ derived }) => {
  const bs = derived.bot_state || {};
  const summary = derived.summary;
  const startedAbs = bs.started_at ? new Date(bs.started_at).toLocaleString([], { month: "short", day: "numeric", hour: "2-digit", minute: "2-digit" }) : "—";
  return (
    <>
      <div className="hero">
        <StatTile label="Scan count" value={bs.scan_count != null ? bs.scan_count.toLocaleString() : "—"} sub={<>session started {startedAbs}</>} />
        <StatTile label="Last scan" value={relTime(bs.last_scan)} sub={bs.last_scan || "—"} />
        <StatTile label="Heartbeat" value={bs.running ? <span className="pos-val">OK</span> : <span className="neg-val">STOPPED</span>} sub={bs.last_heartbeat ? relTime(bs.last_heartbeat) : "—"} />
        <StatTile label="Scans today" value={bs.scans_today != null ? bs.scans_today : "—"} sub={bs.current_date || "—"} />
      </div>
      <Card title="Data sources">
        <table className="table">
          <thead>
            <tr>
              <th>Source</th><th>Purpose</th><th>Status</th>
            </tr>
          </thead>
          <tbody>
            <tr><td className="mono">Kalshi REST</td><td>markets, orders, portfolio</td><td>{bs.running ? <span className="pill status-open">online</span> : <span className="pill status-disabled">off</span>}</td></tr>
            <tr><td className="mono">DraftKings</td><td>moneyline odds</td><td>{bs.dk_disabled ? <span className="pill status-lost">blocked</span> : <span className="pill status-open">online</span>}</td></tr>
            <tr><td className="mono">FanDuel</td><td>moneyline fallback</td><td>{bs.fd_disabled ? <span className="pill status-lost">blocked</span> : <span className="pill status-open">online</span>}</td></tr>
            <tr><td className="mono">ESPN scoreboard</td><td>live scores for watcher</td><td><span className="pill status-open">online</span></td></tr>
          </tbody>
        </table>
      </Card>
      <Card title="Exposure" subtitle="open paper positions">
        <div style={{ display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: 16 }}>
          <StatBit k="Balance" v={money(summary.paper_balance)} />
          <StatBit k="Exposure" v={money(summary.open_exposure)} sub={pct(summary.open_exposure / (summary.paper_balance || 1), 0) + " of balance"} />
          <StatBit k="Open positions" v={summary.open_positions} />
          <StatBit k="Settled · today" v={money(summary.realized_today, true)} pos={summary.realized_today >= 0} />
        </div>
      </Card>
    </>
  );
};

// ============================================================
// App
// ============================================================
const DEFAULT_TWEAKS = { accent: "mint", density: "comfortable", theme: "dark" };

function loadTweaks() {
  try {
    const saved = JSON.parse(localStorage.getItem("glint_tweaks") || "null");
    if (saved && typeof saved === "object") return { ...DEFAULT_TWEAKS, ...saved };
  } catch (_) {}
  return DEFAULT_TWEAKS;
}

function App() {
  const [tweaks, setTweaks] = useState(loadTweaks);
  const [tweaksOpen, setTweaksOpen] = useState(false);
  const [page, setPage] = useState(() => localStorage.getItem("glint_page") || "overview");
  const [raw, setRaw] = useState(null);
  const [loadErr, setLoadErr] = useState(null);
  const [firstLoaded, setFirstLoaded] = useState(false);

  useEffect(() => {
    document.body.dataset.theme = tweaks.theme;
    document.body.dataset.accent = tweaks.accent;
    document.body.dataset.density = tweaks.density;
    try { localStorage.setItem("glint_tweaks", JSON.stringify(tweaks)); } catch (_) {}
  }, [tweaks]);

  useEffect(() => {
    try { localStorage.setItem("glint_page", page); } catch (_) {}
  }, [page]);

  useEffect(() => {
    let alive = true;
    async function tick() {
      const r = await loadAll();
      if (!alive) return;
      const allFailed = !r.bot_state && !r.paper_trades && !r.positions && !r.pending && !r.strategy_audit;
      if (allFailed) {
        setLoadErr("Cannot load data — serve via HTTP: cd hustle-agent/bot && python -m http.server 8080");
        setFirstLoaded(true);
        return;
      }
      setLoadErr(null);
      setRaw(r);
      setFirstLoaded(true);
    }
    tick();
    const iv = setInterval(tick, 5000);
    return () => { alive = false; clearInterval(iv); };
  }, []);

  const derived = useMemo(() => {
    if (!raw) return null;
    const trades = raw.paper_trades || [];
    const positions = raw.positions || [];
    const clv = raw.clv || [];
    const audit = raw.strategy_audit || {};
    const bot_state = raw.bot_state || {};
    const equity = buildEquityCurve(trades);
    const summary = buildSummary(trades, positions, clv, audit);
    const dailyStats = buildDailyStats(trades, equity);
    const scan = bot_state.scan_count;
    const scanCountShort = scan == null ? "—" : scan.toLocaleString();
    return {
      bot_state,
      equity,
      summary,
      dailyStats,
      scanCountShort,
      openPositions: transformPositions(positions),
      pending: transformPending(raw.pending),
      strategies: buildStrategyRows(audit, clv),
      settlements: buildSettlements(trades),
      activity: buildActivity(trades, audit, bot_state),
      clvByStrat: buildClvByStrat(clv),
      liveCards: buildLiveCards(raw.ticks_text),
    };
  }, [raw]);

  const nav = useMemo(() => {
    if (!derived) return [];
    return [
      { id: "overview", label: "Overview" },
      { id: "positions", label: "Positions", count: derived.openPositions.length },
      { id: "pending", label: "Pending", count: derived.pending.length },
      { id: "live", label: "Live watcher", count: derived.liveCards.length },
      { id: "strategies", label: "Strategies", count: derived.strategies.filter(s => s.status === "active").length },
      { id: "history", label: "History", count: derived.settlements.length },
      { id: "clv", label: "CLV" },
      { id: "health", label: "Health" },
    ];
  }, [derived]);

  const navLabel = (p) => {
    const found = nav.find(n => n.id === p);
    return found ? found.label : p;
  };

  const topbarChip = () => {
    if (!derived) return null;
    const s = derived.summary;
    return (
      <>
        <span className="chip mono accent"><span className="chip-dot" />PAPER MODE</span>
        <span className="chip mono">${s.paper_balance.toFixed(2)}</span>
        <span className="chip mono pos"><span className="chip-dot" />{s.open_positions} open · ${s.open_exposure.toFixed(0)} exposed</span>
      </>
    );
  };

  return (
    <div className="app">
      <aside className="sidebar">
        <div className="logo">
          <div className="logo-mark" />
          <div className="logo-text">
            Glint
            <small>{derived && derived.bot_state.running ? "paper · live" : "paper · idle"}</small>
          </div>
        </div>
        <div>
          <div className="nav-section-title">Workspace</div>
          <div className="nav">
            {(nav.length ? nav : [{ id: "overview", label: "Overview" }]).map(n => (
              <div key={n.id} className={"nav-item" + (page === n.id ? " active" : "")} onClick={() => setPage(n.id)}>
                <span className="nav-dot" />
                {n.label}
                {n.count != null && <span className="count">{n.count}</span>}
              </div>
            ))}
          </div>
        </div>
        <div className="sidebar-foot">
          <div className="heartbeat">
            <span className="pulse" />
            {derived && derived.bot_state.running ? "scanning" : "idle"} · {derived ? derived.scanCountShort : "—"} cycles
          </div>
          <div style={{ fontSize: 11, color: "var(--text-dim)" }} className="mono">
            last scan {relTime(derived && derived.bot_state.last_scan)}
          </div>
          <button className="btn ghost sm" onClick={() => setTweaksOpen(!tweaksOpen)} style={{ justifyContent: "flex-start" }}>
            <Icon name="settings" size={14} />
            Tweaks
          </button>
        </div>
      </aside>

      <main className="main">
        <div className="topbar">
          <div>
            <div className="topbar-title">
              {navLabel(page)}
              <small>
                {page === "overview" && "balance, strategies, what just happened"}
                {page === "positions" && "filled orders, unrealized P&L"}
                {page === "pending" && "opportunities the scanner has surfaced"}
                {page === "live" && "per-game tick cards"}
                {page === "strategies" && "real results only"}
                {page === "history" && "settlement log"}
                {page === "clv" && "closing-line value — the gate to going live"}
                {page === "health" && "scan counts, heartbeat, exposure"}
              </small>
            </div>
          </div>
          <div className="spacer" />
          {topbarChip()}
          <button className="icon-btn" title="Theme" onClick={() => setTweaks({ ...tweaks, theme: tweaks.theme === "dark" ? "light" : "dark" })}>
            <Icon name={tweaks.theme === "dark" ? "sun" : "moon"} size={14} />
          </button>
        </div>

        {loadErr && <div className="err-banner">{loadErr}</div>}

        <div className="content">
          {!firstLoaded && <div className="empty">Loading…</div>}
          {firstLoaded && !derived && !loadErr && <div className="empty">No data yet</div>}
          {derived && page === "overview" && (
            <Overview
              derived={derived}
              pending={derived.pending}
              activity={derived.activity}
              liveCards={derived.liveCards}
              strategies={derived.strategies}
              clvByStrat={derived.clvByStrat}
              openPositions={derived.openPositions}
            />
          )}
          {derived && page === "positions" && <PositionsTable positions={derived.openPositions} />}
          {derived && page === "pending"  && <PendingPage pending={derived.pending} />}
          {derived && page === "live"     && <LivePage liveCards={derived.liveCards} />}
          {derived && page === "strategies" && <StrategiesList strategies={derived.strategies} />}
          {derived && page === "history"  && <HistoryPage settlements={derived.settlements} />}
          {derived && page === "clv"      && <CLVPage clvByStrat={derived.clvByStrat} summary={derived.summary} />}
          {derived && page === "health"   && <HealthPage derived={derived} />}
        </div>
      </main>

      {tweaksOpen && <TweaksPanel tweaks={tweaks} setTweaks={setTweaks} onClose={() => setTweaksOpen(false)} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
})();
</script>
</body>
</html>
